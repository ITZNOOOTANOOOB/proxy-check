name: 极致高速更新代理

on:
  schedule:
    - cron: '0 */4 * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    timeout-minutes: 3        # 全局强制 3 分钟退出

    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: 运行更新脚本
        timeout-minutes: 2
        run: script proxy_updater.py

      - name: 提交更新
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          if git diff --quiet; then
            echo "没有新代理"
          else
            git add http.txt proxies.json
            git commit -m "chore: 极致更新 $(date -u +'%Y-%m-%d %H:%M UTC')"
            git push
          fi
